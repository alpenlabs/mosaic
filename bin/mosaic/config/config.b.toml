[logging]
filter = "info"

[circuit]
# Placeholder to allow process startup in this repo checkout.
# Replace with a real .v5c circuit file before running any garbling jobs.
path = "/Users/manishbista/Documents/alpenlabs/mosaic/artifacts/g16.v5c"

[network]
signing_key_hex = "2222222222222222222222222222222222222222222222222222222222222222"
bind_addr = "127.0.0.1:7001"
keep_alive_interval_secs = 1
idle_timeout_secs = 5
reconnect_backoff_secs = 1

[network.client]
open_timeout_secs = 5
ack_timeout_secs = 10

[[network.peers]]
peer_id_hex = "d04ab232742bb4ab3a1368bd4615e4e6d0224ab71a016baf8520a332c9778737"
addr = "127.0.0.1:7000"

[storage]
cluster_file = "/usr/local/etc/foundationdb/fdb.cluster"
global_path = ["local-dev", "node-b"]

[table_store]
backend = "local_filesystem"
root = "/tmp/mosaic-node-b/tables"
prefix = "garbling-tables"

[job_scheduler]
submission_queue_size = 256
completion_queue_size = 256

[job_scheduler.light]
threads = 1
concurrency_per_worker = 32

[job_scheduler.heavy]
threads = 1
concurrency_per_worker = 8

[job_scheduler.garbling]
worker_threads = 2
max_concurrent = 2
batch_timeout_ms = 500
chunk_timeout_secs = 30

[sm_executor]
command_queue_size = 256