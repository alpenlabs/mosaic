# Nextest configuration for Mosaic.
#
# The default nextest timeout is 60s per test. Network integration tests need
# longer because they establish real QUIC connections with TLS handshakes,
# which can be slow on CI runners. The internal test timeout (CI_TIMEOUT) is
# 300s, so the nextest timeout must exceed that.

[profile.default]
# Bump the default timeout slightly above the 60s default to give all tests
# a bit more headroom on slow CI runners.
slow-timeout = { period = "60s", terminate-after = 2 }

# Network integration tests use retry_until_ok(CI_TIMEOUT=300s) internally,
# so the per-test timeout must exceed that. Give 360s (3 × 120s) to
# accommodate CI scheduling jitter on top of the 300s retry deadline.
[[profile.default.overrides]]
filter = "package(mosaic-net-svc) & kind(test)"
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.default.overrides]]
filter = "package(mosaic-net-client) & kind(test)"
slow-timeout = { period = "120s", terminate-after = 3 }
