name: Publish ECR Image

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Full commit SHA to build and push"
        required: true
        type: string
      image_tag:
        description: "ECR image tag (defaults to short SHA)"
        required: false
        type: string

permissions: {}

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 888577024788.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: tn1/mosaic

jobs:
  build-and-push:
    name: Build (amd64) and push to ECR
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(echo '${{ inputs.commit_sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::888577024788:role/github-actions-mosaic-ecr-publish
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
