name: Docker Publish to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit SHA to build. Defaults to the branch HEAD selected in the UI.
        required: false
        type: string
      image_tag:
        description: Optional image tag override. Defaults to the resolved short SHA.
        required: false
        type: string


env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '888577024788.dkr.ecr.us-east-1.amazonaws.com' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'tn1/mosaic' }}

permissions:
  contents: read

concurrency:
  group: docker-publish-ecr-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the build ref + image tag once, so the per-arch matrix and the
  # final merge job all agree on the same values.
  # ---------------------------------------------------------------------------
  prepare:
    name: Resolve build metadata
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      resolved_sha: ${{ steps.meta.outputs.resolved_sha }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - name: Validate manual inputs
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_REF}" ]]; then
            if [[ "${INPUT_REF}" =~ [[:space:]] ]]; then
              echo "::error::ref must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_REF}" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
              echo "::error::ref contains unsupported characters"
              exit 1
            fi
          fi

          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            if [[ "${INPUT_IMAGE_TAG}" =~ [[:space:]] ]]; then
              echo "::error::image_tag must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_IMAGE_TAG}" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
              echo "::error::image_tag must match [A-Za-z0-9._-]{1,128}"
              exit 1
            fi
          fi

      # Shallow checkout of the requested build ref purely to resolve its SHA.
      - name: Checkout build ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1

      - name: Resolve build metadata
        id: meta
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          resolved_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=8 HEAD)"
          checkout_ref="${INPUT_REF:-${GITHUB_SHA}}"
          image_tag="${INPUT_IMAGE_TAG:-${short_sha}}"
          {
            echo "image_tag=${image_tag}"
            echo "resolved_sha=${resolved_sha}"
            echo "checkout_ref=${checkout_ref}"
          } >> "${GITHUB_OUTPUT}"

  # ---------------------------------------------------------------------------
  # Build, scan (hard gate), and push one image per architecture, on native
  # runners (no QEMU). Each arch is pushed under an arch-suffixed tag; the
  # merge job assembles the final multi-arch manifest from them.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    environment: AWS
    permissions:
      contents: read
      id-token: write
      security-events: write
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      ARCH: ${{ matrix.arch }}
      PLATFORM: ${{ matrix.platform }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      # Workflow scripts (render_trivy_summary.py, cleanup action, .trivyignore)
      # always come from main so they are reviewed code regardless of inputs.ref.
      - name: Checkout workflow scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main
          fetch-depth: 0

      # The requested build ref is checked out into build-src/ and used only as
      # Docker build context — no code from it is executed by the runner directly.
      - name: Checkout build ref into build-src/
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0
          path: build-src

      - name: Resolve image refs
        run: |
          set -euo pipefail
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          arch_image_ref="${image_ref}-${ARCH}"
          {
            echo "IMAGE_REF=${image_ref}"
            echo "ARCH_IMAGE_REF=${arch_image_ref}"
          } >> "${GITHUB_ENV}"

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Configure private AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to private ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Build to local Docker daemon (single platform) so Trivy can scan the
      # exact image before any push. Cache scope is per-arch to avoid collisions.
      - name: Build Mosaic image (${{ matrix.arch }})
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${PLATFORM}" \
            --file build-src/docker/Dockerfile \
            --cache-from "type=gha,scope=mosaic-${ARCH}" \
            --cache-to "type=gha,scope=mosaic-${ARCH},mode=max" \
            --tag "${ARCH_IMAGE_REF}" \
            --load \
            build-src

      - name: Create Trivy output directory
        run: mkdir -p trivy-results

      # .trivyignore lives in the root checkout (always main) so only reviewed,
      # merged code can suppress CVEs. Guard creates an empty file for refs that
      # pre-date the file.
      - name: Ensure .trivyignore exists
        run: |
          if [[ ! -f .trivyignore ]]; then
            touch .trivyignore
          fi

      # Hard gate — build fails and no image is pushed if CRITICAL or HIGH unfixed
      # vulnerabilities are found, per architecture.
      - name: Scan Mosaic image with Trivy (hard gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.ARCH_IMAGE_REF }}
          format: json
          output: trivy-results/mosaic.json
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      # Advisory SARIF scan — runs even if the hard gate failed so findings are
      # always visible in the Security tab for triage.
      - name: Scan Mosaic image with Trivy (SARIF — Security tab)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.ARCH_IMAGE_REF }}
          format: sarif
          output: trivy-results/mosaic.sarif
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true
          exit-code: "0"
          trivyignores: .trivyignore

      # Advisory SBOM — CycloneDX artifact for supply chain tracking.
      - name: Generate SBOM with Trivy (CycloneDX)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.ARCH_IMAGE_REF }}
          format: cyclonedx
          output: trivy-results/mosaic.sbom.json
          scanners: vuln
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Render Trivy markdown summary
        if: always()
        continue-on-error: true
        env:
          IMAGE_REF: ${{ env.ARCH_IMAGE_REF }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}-${{ matrix.arch }}
        run: python3 .github/scripts/render_trivy_summary.py

      # Category is per-arch so the two matrix legs don't overwrite each other.
      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: trivy-results/mosaic.sarif
          category: mosaic-ecr-${{ matrix.arch }}

      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-mosaic-${{ env.IMAGE_TAG }}-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            trivy-results/mosaic.json
            trivy-results/mosaic.sarif
            trivy-results/mosaic.sbom.json
            trivy-results/mosaic.md

      # Push only reaches this step if the hard gate scan above passed.
      - name: Push arch image to private ECR
        run: docker push "${ARCH_IMAGE_REF}"

  # ---------------------------------------------------------------------------
  # Assemble the final multi-arch manifest from the per-arch images.
  #
  # NOTE: public ECR publishing is intentionally omitted on this validation
  # branch. Before merging to main, restore the public-ECR push as a multi-arch
  # `buildx imagetools create` against the public registry.
  # ---------------------------------------------------------------------------
  merge:
    name: Merge multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      CHECKOUT_REF: ${{ needs.prepare.outputs.checkout_ref }}
      RESOLVED_SHA: ${{ needs.prepare.outputs.resolved_sha }}
    steps:
      - name: Configure private AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to private ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker buildx imagetools create \
            --tag "${image_ref}" \
            "${image_ref}-amd64" \
            "${image_ref}-arm64"
          echo "IMAGE_REF=${image_ref}" >> "${GITHUB_ENV}"

      - name: Inspect resulting manifest
        run: docker buildx imagetools inspect "${IMAGE_REF}"

      - name: Resolve pushed image digest
        id: digest
        run: |
          set -euo pipefail
          digest="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Append publish summary
        if: always()
        env:
          IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          {
            echo "## Mosaic multi-arch image publish"
            echo
            echo "- Checkout ref: \`${CHECKOUT_REF}\`"
            echo "- Resolved SHA: \`${RESOLVED_SHA}\`"
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Architectures: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Digest: \`${IMAGE_DIGEST:-not pushed}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
