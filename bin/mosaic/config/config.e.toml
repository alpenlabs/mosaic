[logging]
filter = "info"

[circuit]
# Placeholder to allow process startup in this repo checkout.
# Replace with a real .v5c circuit file before running any garbling jobs.
path = "/etc/hosts"

[network]
signing_key_hex = "5555555555555555555555555555555555555555555555555555555555555555"
bind_addr = "127.0.0.1:7004"
keep_alive_interval_secs = 1
idle_timeout_secs = 5
reconnect_backoff_secs = 1

[network.client]
open_timeout_secs = 5
ack_timeout_secs = 10

[[network.peers]]
peer_id_hex = "d04ab232742bb4ab3a1368bd4615e4e6d0224ab71a016baf8520a332c9778737"
addr = "127.0.0.1:7000"

[[network.peers]]
peer_id_hex = "a09aa5f47a6759802ff955f8dc2d2a14a5c99d23be97f864127ff9383455a4f0"
addr = "127.0.0.1:7001"

[[network.peers]]
peer_id_hex = "17cb79fb2b4120f2b1ec65e4198d6e08b28e813feb01e4a400839b85e18080ce"
addr = "127.0.0.1:7002"

[[network.peers]]
peer_id_hex = "d759793bbc13a2819a827c76adb6fba8a49aee007f49f2d0992d99b825ad2c48"
addr = "127.0.0.1:7003"

[storage]
cluster_file = "/etc/foundationdb/fdb.cluster"
global_path = ["local-dev", "node-e"]

[table_store]
backend = "local_filesystem"
root = "/tmp/mosaic-node-e/tables"
prefix = "garbling-tables"

[job_scheduler]
submission_queue_size = 256
completion_queue_size = 256

[job_scheduler.light]
threads = 1
concurrency_per_worker = 32

[job_scheduler.heavy]
threads = 2
concurrency_per_worker = 8

[job_scheduler.garbling]
worker_threads = 2
max_concurrent = 2
batch_timeout_ms = 500
chunk_timeout_secs = 30

[sm_executor]
command_queue_size = 256
restore_interval_secs = 60

[rpc]
bind_addr = "127.0.0.1:8004"
