# Nextest configuration for Mosaic.
#
# The default nextest timeout is 60s per test. Keep defaults tighter so
# networking test failures fail fast instead of burning minutes.

[profile.default]
# Keep non-network tests bounded to at most ~60s.
slow-timeout = { period = "30s", terminate-after = 2 }

# Network integration tests spin up real QUIC endpoints and are expensive
# under nextest's process-level parallelism. Cap their cross-process
# concurrency to reduce scheduler/pathological timeout flakes.
[test-groups.net-integration]
max-threads = 1

# Network integration tests now use short internal CI_TIMEOUT budgets
# (15-20s), so fail them quickly if they hang.
[[profile.default.overrides]]
filter = "package(mosaic-net-svc) & kind(test)"
slow-timeout = { period = "20s", terminate-after = 2 }
test-group = "net-integration"

[[profile.default.overrides]]
filter = "package(mosaic-net-client) & kind(test)"
slow-timeout = { period = "20s", terminate-after = 2 }
test-group = "net-integration"
