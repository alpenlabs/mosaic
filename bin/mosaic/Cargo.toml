[package]
name = "mosaic"
version.workspace = true
edition.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
default = []
reduced-circuits = ["mosaic-common/reduced-circuits"]

[dependencies]
anyhow.workspace = true
mosaic-cac-types.workspace = true
mosaic-common.workspace = true
mosaic-job-executors.workspace = true
mosaic-job-scheduler.workspace = true
mosaic-net-client.workspace = true
mosaic-net-svc.workspace = true
mosaic-rpc-api.workspace = true
mosaic-rpc-server.workspace = true
mosaic-rpc-service.workspace = true
mosaic-sm-executor.workspace = true
mosaic-sm-executor-api.workspace = true
mosaic-storage-api.workspace = true
mosaic-storage-fdb.workspace = true
mosaic-storage-s3.workspace = true

ctrlc = "3.4"
ed25519-dalek = "2.2"
foundationdb.workspace = true
jsonrpsee = { workspace = true, features = ["server"] }
mimalloc = "0.1"
monoio = "0.2.4"
object_store = { version = "0.11", features = ["aws"] }
rand.workspace = true
rand_chacha.workspace = true
serde.workspace = true
tokio = { version = "1", features = ["rt-multi-thread"] }
toml = "0.8"
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
