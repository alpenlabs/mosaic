x-base-mosaic-svc: &base-mosaic-svc
  build:
    context: ..
    dockerfile: docker/Dockerfile
  depends_on:
    fdb-init:
      condition: service_completed_successfully

services:
  foundationdb:
    image: foundationdb/foundationdb:7.3.75
    environment:
      - FDB_NETWORKING_MODE=container
      - FDB_CLUSTER_FILE=/var/fdb/fdb.cluster
    volumes:
      - ./vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
      - ./vol/fdb/data:/var/fdb/data
    ports:
      # Keep this port in sync with ./vol/fdb/fdb.cluster
      - "4500:4500"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "fdbcli --no-status --exec 'status minimal' 2>/dev/null | grep -q 'The database is available' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  fdb-init:
    image: foundationdb/foundationdb:7.3.75
    volumes:
      - ./vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
    depends_on:
      foundationdb:
        condition: service_started
    entrypoint:
      - bash
      - -c
      - |
        if fdbcli -C /var/fdb/fdb.cluster --no-status --exec "status minimal" 2>/dev/null | grep -q "The database is available"; then
          echo "FoundationDB already configured, skipping..."
        else
          echo "Waiting for FDB to be reachable..."
          until fdbcli -C /var/fdb/fdb.cluster --exec "configure new single ssd" 2>/dev/null; do
            echo "FDB not ready, retrying in 2s..."
            sleep 2
          done
          echo -e "\n======== FDB_INITIALIZED ========\n"
        fi
    restart: "no"

  mosaic_1:
    <<: *base-mosaic-svc
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../artifacts/g16.v5c:/etc/mosaic/circuit.v5c:ro
      - ./vol/fdb/fdb.cluster:/etc/foundationdb/fdb.cluster:ro
      - ./vol/mosaic-1/config.toml:/etc/mosaic/config.toml:ro
      - ./vol/mosaic-1/tables:/etc/mosaic/tables:rw

  mosaic_2:
    <<: *base-mosaic-svc
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ../artifacts/g16.v5c:/etc/mosaic/circuit.v5c:ro
      - ./vol/fdb/fdb.cluster:/etc/foundationdb/fdb.cluster:ro
      - ./vol/mosaic-2/config.toml:/etc/mosaic/config.toml:ro
      - ./vol/mosaic-2/tables:/etc/mosaic/tables:rw
