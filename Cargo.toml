[workspace]
members = [
  "crates/adaptor-sigs",
  "crates/cac/crypto",
  "crates/cac/proto-types",
  "crates/cac/types",
  "crates/compute-exec",
  "crates/compute-fw",
  "crates/db/sqlite",
  "crates/db/types",
  "crates/job/manager",
  "crates/job/types",
  "crates/rpc/api",
  "crates/rpc/provider",
  "crates/rpc/server",
  "crates/rpc/types",
  "crates/table-types",
  "crates/vs3",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Alpen Labs <contact@alpenlabs.io>"]
description = "Mosasic garbler infrastructure"
license = "MIT"
readme = "README.md"
repository = "https://github.com/alpenlabs/mosaic"
categories = ["cryptography::cryptocurrencies"]
keywords = ["crypto", "bitcoin"]

[workspace.lints]
rust.missing_debug_implementations = "warn"
rust.rust_2018_idioms = { level = "deny", priority = -1 }
rust.unreachable_pub = "warn"
rust.unused_crate_dependencies = "deny"
rust.unused_must_use = "deny"
rust.unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(coverage, coverage_nightly)',
] }
rust.missing_docs = "warn"
rustdoc.all = "warn"
clippy.too_long_first_doc_paragraph = "warn"

[workspace.dependencies]
mosaic-cac-proto-types = { path = "crates/cac/proto-types" }
mosaic-compute-fw = { path = "crates/compute-fw" }
mosaic-db-sqlite = { path = "crates/db/sqlite" }
mosaic-db-types = { path = "crates/db/types" }
mosaic-job-manager = { path = "crates/job/manager" }
mosaic-job-types = { path = "crates/job/types" }
mosaic-rpc-api = { path = "crates/rpc/api" }
mosaic-rpc-provider = { path = "crates/rpc/provider" }
mosaic-rpc-types = { path = "crates/rpc/types" }
mosaic-table-types = { path = "crates/table-types" }
anyhow = "1.0"
ark-ec = "0.5.0"
ark-ff = "0.5.0"
ark-secp256k1 = "0.5.0"
bytes = "1.10"
jsonrpsee = { version = "0.26.0", features = ["macros"] }
jsonrpsee-types = "*" # constrained by jsonrpsee dep
rand = "0.8"
rand_core = "0.6"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strata-codec = { git = "https://github.com/alpenlabs/strata-common.git" }
thiserror = "2.0"
threadpool = "1.8"
tracing = "0.1"

[profile.release]
opt-level = "z"   # Optimized for size, use 3 for speed
lto = true        # Enable Link Time Optimization
codegen-units = 1 # Reduced to increase optimizations
panic = "unwind"  # Graceful shutdown, even on panic
strip = "symbols" # Strip symbols from binary
